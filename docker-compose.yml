version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_devstone
    restart: always
    ports:
      - "5678:5678" # Acessar em http://localhost:5678
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      # IMPORTANTE:
      # O ponto '.' indica a pasta atual.
      # Tudo o que você fizer no n8n será salvo na pasta 'n8n_data' que deve ser salva no pendrive.
      # É ESTA PASTA que você precisa salvar antes de o PC resetar!
      - ./n8n_data:/home/node/.n8n
